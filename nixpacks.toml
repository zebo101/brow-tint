[phases.install]
cmds = [
  "test -n \"$HEROUI_KEY\" || (echo \"Missing HEROUI_KEY for HeroUI Pro install\" && exit 1)",
  "pnpm install --frozen-lockfile --ignore-scripts",
  "pnpm dlx hpsetup@latest",
  "pnpm exec fumadocs-mdx"
]

[phases.build]
cmds = ["pnpm run build"]

[start]
cmd = "pnpm start"

